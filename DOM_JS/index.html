<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>To-Do List App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo">

        <h1 class="todo__title">
           Yasir daily work to do list
        </h1>

        <div class="todo__input-section">

            <input 
                type="text"
                id="taskInput"
                placeholder="Enter your task"
                class="todo__input"
            >

            <button id="addBtn" class="todo__add-btn">
                Add
            </button>

        </div>

        <ul id="taskList" class="todo__list"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
